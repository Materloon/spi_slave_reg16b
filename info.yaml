# Tiny Tapeout project information
project:
  title:        "SPI Slave REG 16b"      # Project title
  author:       "Massimo"      # Your name
  discord:      "HI-LO"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  A 16-bit SPI slave controller (CPOL=0, CPHA=0) that receives configuration words from an external SPI master and exposes the received data on its output bus. REG_DTX is hard-wired to 10000 (0x2710) so the slave always shifts that constant back to the master on MISO.
  language: "Verilog"
  clock_hz: 25000000
  # How many tiles your design occupies? A single tile is about 340x160 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 3x4 or 4x4

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_top"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_top.v"
    
  
# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  ui[0]: "unused"
  ui[1]: "unused"
  ui[2]: "unused"
  ui[3]: "REG_MOSI – SPI Master-Out Slave-In data (MSB first)"
  ui[4]: "REG_SCK  – SPI clock from master (CPOL=0, CPHA=0)"
  ui[5]: "REG_CSb  – SPI chip-select, active low"
  ui[6]: "unused"
  ui[7]: "unused"
 
  uo[0]: "unused (0)"
  uo[1]: "unused (0)"
  uo[2]: "unused (0)"
  uo[3]: "unused (0)"
  uo[4]: "unused (0)"
  uo[5]: "REG_MISO – SPI Master-In Slave-Out data (MSB first)"
  uo[6]: "unused (0)"
  uo[7]: "unused (0)"
 
  uio[0]: "unused (input)"
  uio[1]: "unused (input)"
  uio[2]: "unused (input)"
  uio[3]: "unused (input)"
  uio[4]: "unused (input)"
  uio[5]: "unused (input)"
  uio[6]: "unused (input)"
  uio[7]: "unused (input)"
# Do not change!
yaml_version: 6
